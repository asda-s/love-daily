services:
  - type: web
    name: love-daily-api
    runtime: docker
    dockerfilePath: ./love-backend/Dockerfile
    dockerContext: ./love-backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: love-daily-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health

  - type: static_site
    name: love-daily-frontend
    buildCommand: cd love-frontend && npm install && npm run build:h5
    staticPublishPath: love-frontend/dist/build/h5
    envVars:
      - key: VITE_API_BASE_URL
        value: https://love-daily-api.onrender.com

databases:
  - name: love-daily-db
    plan: free
    databaseName: love_daily
