services:
  - type: web
    name: love-daily-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: love-daily-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health

databases:
  - name: love-daily-db
    plan: free
    databaseName: love_daily
